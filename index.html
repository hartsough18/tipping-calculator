<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Tip Calculator</title>
  <link rel="manifest" href="pwa_manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <main class="card">
      <!-- Mode Toggle: Calculator (left), Tip Calculator (right) -->
      <div class="mode-toggle-bar">
        <button class="mode-tab active" id="tab-calc" data-mode="calc">Calculator</button>
        <button class="mode-tab" id="tab-tip" data-mode="tip">Tip Calculator</button>
      </div>

      <!-- Basic Calculator Panel (visible by default) -->
      <div id="calc-panel">
        <div class="calc-display-wrapper">
          <div class="calc-display" id="calc-display">0</div>
        </div>

        <!--
          Grid layout — 6 rows:
            Row 1: AC  +/−  %  ÷
            Row 2: 7   8    9  ×
            Row 3: 4   5    6  −
            Row 4: 1   2    3  +
            Row 5: Last5  0(span2)  .      ← short row (0.6fr)
            Row 6: =  =  =  =              ← tall row (1.5fr), full width
        -->
        <div class="calc-grid">
          <!-- Row 1 -->
          <button class="calc-btn calc-ac" data-action="ac">AC</button>
          <button class="calc-btn calc-op" data-action="op" data-op="negate">+/−</button>
          <button class="calc-btn calc-op" data-action="op" data-op="percent">%</button>
          <button class="calc-btn calc-op calc-op-main" data-action="op" data-op="÷">÷</button>

          <!-- Row 2 -->
          <button class="calc-btn calc-digit" data-action="digit" data-digit="7">7</button>
          <button class="calc-btn calc-digit" data-action="digit" data-digit="8">8</button>
          <button class="calc-btn calc-digit" data-action="digit" data-digit="9">9</button>
          <button class="calc-btn calc-op calc-op-main" data-action="op" data-op="×">×</button>

          <!-- Row 3 -->
          <button class="calc-btn calc-digit" data-action="digit" data-digit="4">4</button>
          <button class="calc-btn calc-digit" data-action="digit" data-digit="5">5</button>
          <button class="calc-btn calc-digit" data-action="digit" data-digit="6">6</button>
          <button class="calc-btn calc-op calc-op-main" data-action="op" data-op="−">−</button>

          <!-- Row 4 -->
          <button class="calc-btn calc-digit" data-action="digit" data-digit="1">1</button>
          <button class="calc-btn calc-digit" data-action="digit" data-digit="2">2</button>
          <button class="calc-btn calc-digit" data-action="digit" data-digit="3">3</button>
          <button class="calc-btn calc-op calc-op-main" data-action="op" data-op="+">+</button>

          <!-- Row 5 (short): Last 5 | 0 (span 2) | . -->
          <button class="calc-btn calc-history-btn" id="calc-history-btn" data-action="history">Last 5</button>
          <button class="calc-btn calc-digit calc-zero" data-action="digit" data-digit="0">0</button>
          <button class="calc-btn calc-digit" data-action="decimal">.</button>

          <!-- Row 6 (tall): equals spans all 4 columns -->
          <button class="calc-btn calc-equals calc-equals-full" data-action="equals">=</button>
        </div>
      </div>

      <!-- Tip Calculator Panel (hidden by default) -->
      <div id="tip-panel" class="hidden">
        <div class="tip-panel-inner">
          <div class="input-group">
            <label for="bill-amount">Bill Amount</label>
            <div class="input-wrapper">
              <span class="currency-symbol">$</span>
              <input
                type="number"
                id="bill-amount"
                placeholder="0.00"
                min="0.01"
                step="0.01"
                inputmode="decimal"
                autocomplete="off"
              >
            </div>
          </div>

          <div class="tip-buttons-group">
            <p class="tip-label">Select Tip</p>
            <div class="tip-buttons">
              <button class="tip-btn" data-tip="10">10%</button>
              <button class="tip-btn" data-tip="20">20%</button>
              <button class="tip-btn" data-tip="30">30%</button>
            </div>
          </div>

          <div class="input-group">
            <label for="num-people">Number of People</label>
            <div class="input-wrapper">
              <input
                type="number"
                id="num-people"
                value="1"
                min="1"
                step="1"
                inputmode="numeric"
                autocomplete="off"
              >
            </div>
          </div>

          <div class="results">
            <div class="result-row">
              <span class="result-label">Tip Amount</span>
              <span class="result-value" id="tip-amount">&mdash;</span>
            </div>
            <div class="result-divider"></div>
            <div class="result-row">
              <span class="result-label">New Total</span>
              <span class="result-value" id="new-total">&mdash;</span>
            </div>
            <div class="result-divider"></div>
            <div class="result-row">
              <span class="result-label">Per Person</span>
              <span class="result-value" id="per-person">&mdash;</span>
            </div>
          </div>

          <button class="clear-btn" id="clear-btn">Clear</button>
        </div>
      </div>
    </main>
  </div>

  <!-- History Overlay Popup -->
  <div id="history-overlay" class="history-overlay hidden" aria-modal="true" role="dialog" aria-label="Recent Calculations">
    <div class="history-backdrop" id="history-backdrop"></div>
    <div class="history-popup">
      <div class="history-popup-header">
        <span class="history-popup-title">Recent Calculations</span>
        <button class="history-popup-close" id="history-popup-close" aria-label="Close">&times;</button>
      </div>
      <ul class="calc-history-list" id="calc-history-list">
        <li class="calc-history-empty">No calculations yet</li>
      </ul>
    </div>
  </div>

  <script src="app.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
