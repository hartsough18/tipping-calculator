<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Tip Calculator</title>
  <link rel="manifest" href="pwa_manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 id="app-title">Tip Calculator</h1>
    </header>

    <main class="card">
      <!-- Mode Toggle -->
      <div class="mode-toggle-bar">
        <button class="mode-tab active" id="tab-tip" data-mode="tip">Tip Calculator</button>
        <button class="mode-tab" id="tab-calc" data-mode="calc">Calculator</button>
      </div>

      <!-- Tip Calculator Panel -->
      <div id="tip-panel">
        <div class="tip-panel-inner">
          <div class="input-group">
            <label for="bill-amount">Bill Amount</label>
            <div class="input-wrapper">
              <span class="currency-symbol">$</span>
              <input
                type="number"
                id="bill-amount"
                placeholder="0.00"
                min="0.01"
                step="0.01"
                inputmode="decimal"
                autocomplete="off"
              >
            </div>
          </div>

          <div class="tip-buttons-group">
            <p class="tip-label">Select Tip</p>
            <div class="tip-buttons">
              <button class="tip-btn" data-tip="10">10%</button>
              <button class="tip-btn" data-tip="20">20%</button>
              <button class="tip-btn" data-tip="30">30%</button>
            </div>
          </div>

          <div class="input-group">
            <label for="num-people">Number of People</label>
            <div class="input-wrapper">
              <input
                type="number"
                id="num-people"
                value="1"
                min="1"
                step="1"
                inputmode="numeric"
                autocomplete="off"
              >
            </div>
          </div>

          <div class="results">
            <div class="result-row">
              <span class="result-label">Tip Amount</span>
              <span class="result-value" id="tip-amount">&mdash;</span>
            </div>
            <div class="result-divider"></div>
            <div class="result-row">
              <span class="result-label">New Total</span>
              <span class="result-value" id="new-total">&mdash;</span>
            </div>
            <div class="result-divider"></div>
            <div class="result-row">
              <span class="result-label">Per Person</span>
              <span class="result-value" id="per-person">&mdash;</span>
            </div>
          </div>

          <button class="clear-btn" id="clear-btn">Clear</button>
        </div>
      </div>

      <!-- Basic Calculator Panel (hidden by default) -->
      <div id="calc-panel" class="hidden">
        <div class="calc-display-wrapper">
          <div class="calc-display" id="calc-display">0</div>
        </div>
        <div class="calc-grid">
          <button class="calc-btn calc-ac" data-action="ac">AC</button>
          <button class="calc-btn calc-op" data-action="op" data-op="negate">+/−</button>
          <button class="calc-btn calc-op" data-action="op" data-op="percent">%</button>
          <button class="calc-btn calc-op calc-op-main" data-action="op" data-op="÷">÷</button>

          <button class="calc-btn calc-digit" data-action="digit" data-digit="7">7</button>
          <button class="calc-btn calc-digit" data-action="digit" data-digit="8">8</button>
          <button class="calc-btn calc-digit" data-action="digit" data-digit="9">9</button>
          <button class="calc-btn calc-op calc-op-main" data-action="op" data-op="×">×</button>

          <button class="calc-btn calc-digit" data-action="digit" data-digit="4">4</button>
          <button class="calc-btn calc-digit" data-action="digit" data-digit="5">5</button>
          <button class="calc-btn calc-digit" data-action="digit" data-digit="6">6</button>
          <button class="calc-btn calc-op calc-op-main" data-action="op" data-op="−">−</button>

          <button class="calc-btn calc-digit" data-action="digit" data-digit="1">1</button>
          <button class="calc-btn calc-digit" data-action="digit" data-digit="2">2</button>
          <button class="calc-btn calc-digit" data-action="digit" data-digit="3">3</button>
          <button class="calc-btn calc-op calc-op-main" data-action="op" data-op="+">+</button>

          <button class="calc-btn calc-digit calc-zero" data-action="digit" data-digit="0">0</button>
          <button class="calc-btn calc-digit" data-action="decimal">.</button>
          <button class="calc-btn calc-equals" data-action="equals">=</button>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
