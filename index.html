<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Tip Calculator</title>
  <link rel="manifest" href="pwa_manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <main class="card">
      <!-- History toggle button — sole top navigation affordance -->
      <div class="top-nav">
        <button class="history-btn" id="history-btn" aria-label="View history">History</button>
      </div>

      <!-- Calculator View -->
      <div id="calc-view">
        <div class="tip-panel-inner">
          <div class="input-group">
            <label for="bill-amount">Bill Amount</label>
            <div class="input-wrapper">
              <span class="currency-symbol">$</span>
              <input
                type="number"
                id="bill-amount"
                placeholder="0.00"
                min="0.01"
                step="0.01"
                inputmode="decimal"
                autocomplete="off"
              >
            </div>
          </div>

          <div class="tip-buttons-group">
            <p class="tip-label">Select Tip</p>
            <div class="tip-buttons">
              <button class="tip-btn" data-tip="10">10%</button>
              <button class="tip-btn" data-tip="20">20%</button>
              <button class="tip-btn" data-tip="30">30%</button>
            </div>
          </div>

          <div class="results">
            <div class="result-row">
              <span class="result-label">Tip Amount</span>
              <span class="result-value" id="tip-amount">&mdash;</span>
            </div>
            <div class="result-divider"></div>
            <div class="result-row">
              <span class="result-label">New Total</span>
              <span class="result-value" id="new-total">&mdash;</span>
            </div>
          </div>
        </div>
      </div>

      <!-- History View (hidden by default) -->
      <div id="history-view" class="hidden">
        <div class="history-panel-inner">
          <div class="history-header">
            <button class="back-btn" id="back-btn" aria-label="Back to calculator">&larr; Calculator</button>
            <h2 class="history-title">Recent Calculations</h2>
          </div>
          <div id="history-list" class="history-list">
            <p class="history-empty" id="history-empty">No history yet</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
