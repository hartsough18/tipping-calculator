<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<a id="dl192" download="icon-192.png">Download icon-192.png</a><br>
<a id="dl512" download="icon-512.png">Download icon-512.png</a>
<script>
function drawCalcIcon(canvas) {
  var size = canvas.width;
  var ctx = canvas.getContext('2d');
  var s = size / 32;
  var r = 6 * s;

  // Background
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Display bar
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  var dx = 5*s, dy = 5*s, dw = 22*s, dh = 7*s, dr = 2*s;
  ctx.beginPath();
  ctx.moveTo(dx+dr, dy);
  ctx.lineTo(dx+dw-dr, dy);
  ctx.quadraticCurveTo(dx+dw, dy, dx+dw, dy+dr);
  ctx.lineTo(dx+dw, dy+dh-dr);
  ctx.quadraticCurveTo(dx+dw, dy+dh, dx+dw-dr, dy+dh);
  ctx.lineTo(dx+dr, dy+dh);
  ctx.quadraticCurveTo(dx, dy+dh, dx, dy+dh-dr);
  ctx.lineTo(dx, dy+dr);
  ctx.quadraticCurveTo(dx, dy, dx+dr, dy);
  ctx.closePath();
  ctx.fill();

  function drawBtn(bx, by, color) {
    var bw = 6*s, bh = 5*s, br = 1.5*s;
    bx = bx*s; by = by*s;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(bx+br, by);
    ctx.lineTo(bx+bw-br, by);
    ctx.quadraticCurveTo(bx+bw, by, bx+bw, by+br);
    ctx.lineTo(bx+bw, by+bh-br);
    ctx.quadraticCurveTo(bx+bw, by+bh, bx+bw-br, by+bh);
    ctx.lineTo(bx+br, by+bh);
    ctx.quadraticCurveTo(bx, by+bh, bx, by+bh-br);
    ctx.lineTo(bx, by+br);
    ctx.quadraticCurveTo(bx, by, bx+br, by);
    ctx.closePath();
    ctx.fill();
  }

  drawBtn(5, 15, 'rgba(255,255,255,0.85)');
  drawBtn(13, 15, 'rgba(255,255,255,0.85)');
  drawBtn(21, 15, 'rgba(255,255,255,0.85)');
  drawBtn(5, 23, 'rgba(255,255,255,0.85)');
  drawBtn(13, 23, 'rgba(255,255,255,0.85)');
  drawBtn(21, 23, '#93c5fd');
}

var c192 = document.getElementById('c192');
var c512 = document.getElementById('c512');
drawCalcIcon(c192);
drawCalcIcon(c512);
document.getElementById('dl192').href = c192.toDataURL('image/png');
document.getElementById('dl512').href = c512.toDataURL('image/png');
</script>
</body>
</html>
